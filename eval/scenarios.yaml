- id: wiki-roundtrip
  description: Kairos writes a page, then reads it back verbatim.
  timeout_s: 120
  prompt: |
    wiki.write 로 eval/smoke 페이지를 만들고, 내용은 다음 두 줄 그대로 해줘:
    eval smoke OK
    timestamp 2026-04-16

    저장한 다음 wiki.get eval/smoke 으로 내용을 불러와서 그대로 보여줘.
  expect:
    tool_calls_contain:
      - mcp__knowledge__wiki_write
      - mcp__knowledge__wiki_get
    page_path: eval/smoke.md
    page_contains:
      - eval smoke OK
      - timestamp 2026-04-16
    finish_reason: stop

- id: slash-wiki-list
  description: /wiki list returns the seed page set.
  timeout_s: 90
  prompt: /wiki list
  expect:
    tool_calls_contain:
      - mcp__knowledge__wiki_list
    text_contains_any:
      - README
      - operators
      - runbooks
    finish_reason: stop

- id: wiki-search-finds-seed
  description: wiki.search returns hits for a seeded topic.
  timeout_s: 90
  prompt: /wiki search troubleshooting
  expect:
    tool_calls_contain:
      - mcp__knowledge__wiki_search
    text_contains_any:
      - operators/troubleshooting
    finish_reason: stop

- id: wiki-rename-moves-page
  description: >-
    wiki.rename moves eval/smoke → eval/smoke-renamed. Depends on
    `wiki-roundtrip` having just populated eval/smoke.md.
  timeout_s: 90
  prompt: |
    wiki.rename 으로 `eval/smoke` 페이지를 `eval/smoke-renamed` 로 이동해줘.
    이동한 뒤 "이동 완료: eval/smoke-renamed" 한 줄만 말해줘.
  expect:
    tool_calls_contain:
      - mcp__knowledge__wiki_rename
    page_path: eval/smoke-renamed.md
    page_contains:
      - eval smoke OK
    page_path_absent: eval/smoke.md
    finish_reason: stop

- id: wiki-delete-archives-page
  description: >-
    wiki.delete soft-archives eval/smoke-renamed. Depends on
    `wiki-rename-moves-page` having just created it.
  timeout_s: 90
  prompt: |
    wiki.delete 로 `eval/smoke-renamed` 페이지를 삭제해줘.
    삭제한 뒤 "삭제 완료" 한 줄만 말해줘.
  expect:
    tool_calls_contain:
      - mcp__knowledge__wiki_delete
    page_path_absent: eval/smoke-renamed.md
    finish_reason: stop

- id: web-search-direct-query
  description: >-
    Direct `web.search` MCP tool invocation. Verifies the SearXNG round-trip
    works end-to-end without relying on any wiki-first search fallback.
    Separately, guards against Kairos silently substituting Claude Code's
    built-in `WebSearch` — `KAIROS_DISALLOWED_TOOLS` blocks that surface
    at spawn time so the MCP path is the only route.
  timeout_s: 120
  prompt: |
    web.search 도구로 "Rust async runtime comparison" 을 검색해서,
    결과 중 상위 3 개의 제목만 한 줄씩 나열해줘.
    제목만 보여주면 되고 본문 요약은 필요 없어.
  expect:
    tool_calls_contain:
      - mcp__knowledge__web_search
    finish_reason: stop

- id: manycoresoft-explain
  description: >-
    Narrative answer path. With the built-in WebSearch blocked via
    `KAIROS_DISALLOWED_TOOLS`, Kairos reliably falls back to the MCP
    `web.search` when no wiki page exists, so this scenario now passes
    without the pre-seeded `manycoresoft.md` page that previously made
    it flaky. The stream drop bug this scenario was born to catch is
    locked in separately by
    `stream.rs::looks_like_internal_tool_result` + the transport
    orphan-result skip in `openai-transport.ts`.
  timeout_s: 240
  prompt: 매니코어소프트에 대해서 설명을 못하나?
  expect:
    text_contains_any:
      - 천둥
      - THUNDER
      - DEEP Gadget
      - 서울대
      - GPU
    finish_reason: stop

- id: manycoresoft-research-and-save
  description: >-
    Full research → save chain: `web.search` → `wiki.write`. Requires
    `[knowledge.search]` wired to a running SearXNG. The prompt enumerates
    the tool calls as numbered steps and makes "end without calling
    wiki.write" an explicit failure case, because Kairos has a bias toward
    reporting findings inline when given looser instructions.
  timeout_s: 300
  prompt: |
    아래 3 단계를 순서대로 **전부** 실행해. 한 단계라도 건너뛰면 실패로 간주함.

    1. `web.search` 도구로 "매니코어소프트 DEEP Gadget" 를 검색.
    2. 검색 결과를 바탕으로 **무조건** `wiki.write` 를 다음 인자로 호출:
       - `name`: `manycoresoft`
       - `content`: 아래 markdown 템플릿을 조사 내용으로 채운 결과.

       ```
       # 매니코어소프트

       - 본사 / 연구 배경 한 줄 (THUNDER 연구실 언급)
       - 주력 제품 한 줄 (DEEP Gadget, 수랭식 GPU 서버)
       - 출처 URL 1~3개
       ```
    3. 위 세 단계가 끝난 뒤에만 "저장 완료: manycoresoft" 한 줄만 대답.

    설명·사과·요약·중간보고 없이, 위 순서대로 도구를 호출하고 마지막 한 줄만 답해.
  expect:
    tool_calls_contain:
      - mcp__knowledge__web_search
    # wiki_write evidence is the on-disk page + its content; Claude Code
    # occasionally folds the wiki.write tool_use into its final assistant
    # event in a way that the stream marker regex (which counts `🔧 **...**`
    # tool_use cards) can miss even though the MCP dispatch succeeds and
    # the git commit lands. The page assertions below are the
    # authoritative evidence that wiki.write ran; the tool_calls list is
    # informational.
    page_path: manycoresoft.md
    page_contains_any:
      - 천둥
      - DEEP Gadget
      - GPU
      - 서울대
    finish_reason: stop

manifest_version = 3

[bundle]
id = "social-media-intelligence"
version = "0.1.0"
class = "intelligence"
publisher = "gadgetron.project"
license = "Apache-2.0"

[compatibility]
gadgetron = ">=0.7.21, <2.0.0"
host_protocol_min = 1
host_protocol_max = 1

[runtime]
kind = "subprocess"
transport = "json_rpc_stdio"
entry = "bin/social-media-intelligence"
entry_sha256 = "@ENTRY_SHA256@"

[runtime.limits]
memory_mb = 192
open_files = 48
cpu_seconds = 30

[[permissions]]
id = "social-read"
kind = "database"
description = "Read tenant-scoped Social Media Intelligence records"
resources = ["postgres:table:social_posts", "postgres:table:social_conversations", "postgres:table:social_signals", "postgres:table:social_briefings", "postgres:table:social_response_drafts"]

[[permissions]]
id = "social-write"
kind = "database"
description = "Write tenant-scoped Social Media Intelligence records through Core-compiled mutations"
resources = ["postgres:table:social_posts", "postgres:table:social_conversations", "postgres:table:social_signals", "postgres:table:social_briefings", "postgres:table:social_response_drafts"]

[[permissions]]
id = "social-purge"
kind = "database"
description = "Remove Source-derived social records after Manager approval"
resources = ["postgres:table:social_posts", "postgres:table:social_conversations", "postgres:table:social_signals", "postgres:table:social_briefings", "postgres:table:social_response_drafts"]

[[permissions]]
id = "social-collections"
kind = "knowledge_collection"
description = "Manage only Social watchlists through the Core collection authority"
resources = ["knowledge:collection"]

[capabilities]
gadget_namespaces = ["social"]

[[capabilities.provides]]
id = "gadgetron.intelligence.social-context"
version = "1.0.0"
description = "Cited public conversation, signal, briefing, and response-draft context through the Core knowledge exchange"

[[capabilities.domain_schemas]]
id = "social-domain"
version = 1
schema_path = "schema/domain.json"
sha256 = "208ded12b0cea67c2a89791080feb0378298eac5e02e919fda7126140bd1e1a1"

[[capabilities.gadgets]]
name = "social.watchlist-list"
description = "List Social watchlists and their public provider collection state"
tier = "read"
input_schema = { type = "object", properties = { limit = { type = "integer", minimum = 1, maximum = 200, default = 100 } }, additionalProperties = false }
output_schema = { type = "object", properties = { rows = { type = "array" }, count = { type = "integer" }, truncated = { type = "boolean" } }, required = ["rows", "count", "truncated"] }
[capabilities.gadgets.effect]
risk = "low"
idempotent = true
reversible = true
requires_evidence = false

[[capabilities.gadgets]]
name = "social.watchlist-collect"
description = "Collect the approved public provider query for this watchlist now"
tier = "write"
input_schema = { type = "object", x_gadgetron_row_action = true, properties = { collection_id = { type = "string", format = "uuid", title = "Watchlist" }, expected_revision = { type = "integer", minimum = 1, title = "Current revision" } }, required = ["collection_id", "expected_revision"], additionalProperties = false }
output_schema = { type = "object" }
[capabilities.gadgets.effect]
risk = "low"
idempotent = true
reversible = true
requires_evidence = false

[[capabilities.gadgets]]
name = "social.post-list"
description = "List purgeable public post snapshots"
tier = "read"
input_schema = { type = "object", properties = { topic_id = { type = "string", format = "uuid" }, limit = { type = "integer", minimum = 1, maximum = 500, default = 100 } }, additionalProperties = false }
output_schema = { type = "object", properties = { rows = { type = "array" }, count = { type = "integer" }, truncated = { type = "boolean" } }, required = ["rows", "count", "truncated"] }
[capabilities.gadgets.effect]
risk = "low"
idempotent = true
reversible = true
requires_evidence = false

[[capabilities.gadgets]]
name = "social.post-upsert"
description = "Persist an idempotent Source-revision-pinned public post snapshot"
tier = "write"
input_schema = { type = "object", properties = { topic_id = { type = "string", format = "uuid" }, provider = { type = "string", enum = ["bluesky"] }, external_uri = { type = "string", pattern = "^at://", maxLength = 2000 }, cid = { type = "string", minLength = 1, maxLength = 200 }, author_handle = { type = "string", minLength = 3, maxLength = 253 }, text_excerpt = { type = "string", minLength = 1, maxLength = 1000 }, language = { type = "string", minLength = 2, maxLength = 35 }, reply_to_uri = { type = "string", pattern = "^at://", maxLength = 2000 }, quote_uri = { type = "string", pattern = "^at://", maxLength = 2000 }, state = { type = "string", enum = ["current", "edited", "deleted", "moderated"] }, engagement = { type = "object" }, moderation_labels = { type = "array" }, source_id = { type = "string", format = "uuid" }, source_revision = { type = "integer", minimum = 1 }, fetched_at = { type = "string", format = "date-time" }, content_hash = { type = "string", pattern = "^[0-9a-f]{64}$" } }, required = ["topic_id", "provider", "external_uri", "cid", "author_handle", "text_excerpt", "state", "engagement", "source_id", "source_revision", "fetched_at", "content_hash"], additionalProperties = false }
output_schema = { type = "object" }
[capabilities.gadgets.effect]
risk = "low"
idempotent = true
reversible = false
requires_evidence = true

[[capabilities.jobs]]
id = "social-watchlist-scouting"
role = "source_scout"
triggers = ["on_demand"]
gadget_allowlist = ["social.watchlist-list"]
budget = { max_gadget_calls = 4, max_wall_seconds = 120 }

[[capabilities.jobs]]
id = "social-conversation-research"
role = "researcher"
triggers = ["on_demand"]
gadget_allowlist = ["social.watchlist-list", "social.post-list", "social.post-upsert", "social.conversation-list", "social.conversation-upsert"]
budget = { max_gadget_calls = 32, max_wall_seconds = 300 }

[[capabilities.jobs]]
id = "social-signal-distillation"
role = "gardener"
triggers = ["on_demand"]
gadget_allowlist = ["social.post-list", "social.conversation-list", "social.signal-list", "social.signal-upsert", "social.briefing-list", "social.briefing-upsert", "social.signal-graph"]
budget = { max_gadget_calls = 32, max_wall_seconds = 300 }

[[capabilities.jobs]]
id = "social-response-assistance"
role = "researcher"
triggers = ["on_demand"]
gadget_allowlist = ["social.briefing-list", "social.response-draft-list", "social.response-draft-upsert", "social.response-draft-handoff"]
budget = { max_gadget_calls = 12, max_wall_seconds = 180 }

[[capabilities.collection_profiles]]
id = "social-bluesky-watchlist"
label = "Bluesky watchlist"
description = "Collect bounded public Bluesky search results through Core without granting Bundle network access"
connector = "core-social-api"
source_classes = ["social"]
allowlisted_domains = ["api.bsky.app"]
extractor_hints = ["post", "thread", "moderation", "revision"]
freshness_seconds = 900
schedule = "*/15 * * * *"
budget = { max_sources = 5, max_bytes = 8388608, max_wall_seconds = 180 }
recipe_asset = "social-source-collection"

[[capabilities.collection_profiles.query_providers]]
id = "bluesky-search"
label = "Bluesky keyword"
description = "Official public AppView search for a bounded keyword or phrase"
source_class = "social"
query_label = "Keyword or phrase"
query_placeholder = "Linux server monitoring"
scope_label = "Sort"
scope_placeholder = "latest"
default_scope = "latest"
supports_tags = true
supports_language = true
requires_configuration = false
max_window_days = 90

[[capabilities.collection_profiles.query_providers]]
id = "bluesky-author"
label = "Bluesky account"
description = "Official public AppView search restricted to one handle or DID"
source_class = "social"
query_label = "Handle or DID"
query_placeholder = "example.bsky.social"
scope_label = "Sort"
scope_placeholder = "latest"
default_scope = "latest"
supports_tags = true
supports_language = true
requires_configuration = false
max_window_days = 90

[[capabilities.agent_roles]]
id = "social-watchlist-scout"
label = "Social watchlist scout"
description = "Finds bounded public Bluesky coverage for Manager-defined watchlists"
core_role = "source_scout"
job = "social-watchlist-scouting"
recipe_asset = "social-source-collection"
collection_profile = "social-bluesky-watchlist"
prompt_contract_revision = "social-watchlist-scout-v1"

[[capabilities.agent_roles]]
id = "social-researcher"
label = "Social conversation researcher"
description = "Separates public conversation observations, corrections, reach, and uncertainty"
core_role = "researcher"
job = "social-conversation-research"
recipe_asset = "social-conversation-research"
collection_profile = "social-bluesky-watchlist"
followup_role = "social-distiller"
prompt_contract_revision = "social-conversation-research-v2"

[[capabilities.agent_roles]]
id = "social-distiller"
label = "Social signal distiller"
description = "Connects cited public posts into signals, briefings, and reviewed Knowledge proposals"
core_role = "gardener"
job = "social-signal-distillation"
recipe_asset = "social-signal-distillation"
collection_profile = "social-bluesky-watchlist"
prompt_contract_revision = "social-signal-distillation-v3"

[[capabilities.agent_roles]]
id = "social-response-assistant"
label = "Social response assistant"
description = "Prepares cited human-review drafts without social publication authority"
core_role = "researcher"
job = "social-response-assistance"
recipe_asset = "social-response-assistance"
prompt_contract_revision = "social-response-assistance-v2"

[[capabilities.workspaces]]
id = "watchlists"
label = "Social watchlists"
renderer = "table"
data_capability = "social.watchlist-list"
collection_profile = "social-bluesky-watchlist"
action_gadgets = ["social.watchlist-collect", "social.source-purge"]
required_scopes = ["management"]

[[capabilities.workspaces]]
id = "conversations"

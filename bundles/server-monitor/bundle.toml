# server-monitor — first-party bundle manifest.
#
# Exposes five workbench actions that map 1:1 onto the `server.*` Gadgets
# registered by `bundles/server-monitor`. Install by pointing
# `[web] bundles_dir = "bundles"` at the repo root (or by calling
# `POST /api/v1/web/workbench/admin/bundles` with this file).
#
# Gadget wiring — each action is dispatched via `GadgetDispatcher` with
# `source_kind = "gadget"`. The Rust provider (`ServerMonitorProvider`)
# must be registered by the runtime for dispatch to succeed; without it,
# the actions surface as 404 from the workbench.

[bundle]
id = "server-monitor"
version = "0.1.0"

allow_direct_actions = true

# -- Views -----------------------------------------------------------------

[[views]]
id = "servers-dashboard"
title = "Servers"
owner_bundle = "server-monitor"
source_kind = "activity"
source_id = "server-monitor/recent"
placement = "left_rail"
renderer = "timeline"
data_endpoint = "/api/v1/web/workbench/views/servers-dashboard/data"
refresh_seconds = 5
action_ids = ["server-add", "server-list", "server-remove", "server-info", "server-stats"]

# -- Actions ---------------------------------------------------------------

[[actions]]
id = "server-add"
title = "서버 등록"
owner_bundle = "server-monitor"
source_kind = "gadget"
source_id = "server.add"
gadget_name = "server.add"
placement = "center_main"
kind = "mutation"
destructive = false
requires_approval = false
knowledge_hint = "새 host를 inventory에 등록합니다. password_bootstrap 모드일 때는 sudoers.d NOPASSWD + lm-sensors/DCGM 자동 설치."
input_schema = { type = "object", properties = { host = { type = "string", minLength = 1, maxLength = 255 }, ssh_user = { type = "string", minLength = 1, maxLength = 64 }, ssh_port = { type = "integer", minimum = 1, maximum = 65535 }, auth_mode = { type = "string", enum = ["key_path", "key_paste", "password_bootstrap"] }, ssh_key_path = { type = "string" }, ssh_private_key = { type = "string" }, ssh_password = { type = "string" }, sudo_password = { type = "string" } }, required = ["host", "ssh_user", "auth_mode"], additionalProperties = false }

[[actions]]
id = "server-list"
title = "서버 목록"
owner_bundle = "server-monitor"
source_kind = "gadget"
source_id = "server.list"
gadget_name = "server.list"
placement = "context_menu"
kind = "query"
destructive = false
requires_approval = false
knowledge_hint = "등록된 host 목록 + last_ok_at 타임스탬프."
input_schema = { type = "object", properties = {}, additionalProperties = false }

[[actions]]
id = "server-remove"
title = "서버 삭제"
owner_bundle = "server-monitor"
source_kind = "gadget"
source_id = "server.remove"
gadget_name = "server.remove"
placement = "context_menu"
kind = "mutation"
destructive = false
requires_approval = false
knowledge_hint = "inventory에서 host 삭제. key_paste/password_bootstrap 모드로 생성된 private key는 함께 제거."
input_schema = { type = "object", properties = { id = { type = "string", format = "uuid" } }, required = ["id"], additionalProperties = false }

[[actions]]
id = "server-info"
title = "서버 정보"
owner_bundle = "server-monitor"
source_kind = "gadget"
source_id = "server.info"
gadget_name = "server.info"
placement = "context_menu"
kind = "query"
destructive = false
requires_approval = false
knowledge_hint = "hostname/kernel/OS/CPU/RAM/GPU 모델 1회 스냅샷."
input_schema = { type = "object", properties = { id = { type = "string", format = "uuid" } }, required = ["id"], additionalProperties = false }

[[actions]]
id = "server-stats"
title = "서버 통계"
owner_bundle = "server-monitor"
source_kind = "gadget"
source_id = "server.stats"
gadget_name = "server.stats"
placement = "context_menu"
kind = "query"
destructive = false
requires_approval = false
knowledge_hint = "실시간 CPU/RAM/disk/temp/GPU/PSU 스냅샷. UI가 5초마다 폴링."
input_schema = { type = "object", properties = { id = { type = "string", format = "uuid" } }, required = ["id"], additionalProperties = false }

[[actions]]
id = "server-systemctl"
title = "서비스 제어"
owner_bundle = "server-monitor"
source_kind = "gadget"
source_id = "server.systemctl"
gadget_name = "server.systemctl"
placement = "context_menu"
kind = "mutation"
destructive = true
requires_approval = false
knowledge_hint = "원격 호스트에서 systemctl (start/stop/restart/enable/disable/status). NOPASSWD sudoers 필요."
input_schema = { type = "object", properties = { id = { type = "string", format = "uuid" }, verb = { type = "string", enum = ["start","stop","restart","reload","enable","disable","status","is-active","is-enabled"] }, unit = { type = "string", maxLength = 255 } }, required = ["id","verb","unit"], additionalProperties = false }

[[actions]]
id = "server-journal"
title = "서버 로그"
owner_bundle = "server-monitor"
source_kind = "gadget"
source_id = "server.journal"
gadget_name = "server.journal"
placement = "context_menu"
kind = "query"
destructive = false
requires_approval = false
knowledge_hint = "원격 호스트의 journalctl 최근 로그. unit/priority/lines 필터 지원."
input_schema = { type = "object", properties = { id = { type = "string", format = "uuid" }, unit = { type = "string", maxLength = 255 }, lines = { type = "integer", minimum = 10, maximum = 2000 }, priority = { type = "string" } }, required = ["id"], additionalProperties = false }

[[actions]]
id = "server-bash"
title = "쉘 실행"
owner_bundle = "server-monitor"
source_kind = "gadget"
source_id = "server.bash"
gadget_name = "server.bash"
placement = "context_menu"
kind = "mutation"
destructive = true
requires_approval = true
knowledge_hint = "원격 호스트에서 임의의 bash 명령 실행. use_sudo=true면 NOPASSWD sudo로 권한 상승. 사용자가 UI에서 매 호출마다 승인 필요. apt/systemd 등 기존 전용 gadget이 없는 경우 일반 해결 경로."
input_schema = { type = "object", properties = { id = { type = "string", format = "uuid" }, command = { type = "string", minLength = 1, maxLength = 8192 }, use_sudo = { type = "boolean" } }, required = ["id", "command"], additionalProperties = false }

[[actions]]
id = "server-logread"
title = "로그/dmesg 보기"
owner_bundle = "server-monitor"
source_kind = "gadget"
source_id = "server.logread"
gadget_name = "server.logread"
placement = "context_menu"
kind = "query"
destructive = false
requires_approval = false
knowledge_hint = "dmesg 또는 임의 로그 파일 (kern/syslog/auth/path:<file>). lines 캡, grep 정규식 필터."
input_schema = { type = "object", properties = { id = { type = "string", format = "uuid" }, source = { type = "string", maxLength = 512 }, lines = { type = "integer", minimum = 10, maximum = 2000 }, grep = { type = "string", maxLength = 256 } }, required = ["id"], additionalProperties = false }

[[actions]]
id = "server-update"
title = "서버 정보 수정"
owner_bundle = "server-monitor"
source_kind = "gadget"
source_id = "server.update"
gadget_name = "server.update"
placement = "context_menu"
kind = "mutation"
destructive = false
requires_approval = false
knowledge_hint = "alias / host(IP) / ssh_user / ssh_port 변경. host_metrics는 host_id UUID로 매핑되어 있어 IP 바꿔도 시계열 보존."
input_schema = { type = "object", properties = { id = { type = "string", format = "uuid" }, alias = { type = ["string","null"], maxLength = 64 }, host = { type = "string", maxLength = 253 }, ssh_user = { type = "string", maxLength = 64 }, ssh_port = { type = "integer", minimum = 1, maximum = 65535 }, gadgetini = { type = ["object","null"], properties = { enabled = { type = "boolean" }, host_name = { type = ["string","null"], maxLength = 253 }, ssh_user = { type = "string", maxLength = 64 }, ssh_port = { type = "integer", minimum = 1, maximum = 65535 }, parent_iface = { type = "string", maxLength = 64 }, ipv6_link_local = { type = "string", maxLength = 128 }, mac = { type = ["string","null"], maxLength = 32 }, key_path = { type = "string" }, web_port = { type = "integer", minimum = 1, maximum = 65535 }, password = { type = "string" } }, additionalProperties = false } }, required = ["id"], additionalProperties = false }

manifest_version = 3

[bundle]
id = "server-administrator"
version = "0.4.27"
class = "operational"
publisher = "gadgetron.project"
license = "Apache-2.0"

[compatibility]
gadgetron = ">=0.8.5, <2.0.0"
host_protocol_min = 1
host_protocol_max = 1

[[dependencies.optional]]
capability = "gadgetron.intelligence.server-operations-context"
version = "^1.0"
feature = "research-assisted-diagnosis"
reason = "Cited server operations research improves diagnosis without owning fleet state or repair authority"

[runtime]
kind = "subprocess"
transport = "json_rpc_stdio"
entry = "bin/server-administrator"
entry_sha256 = "@ENTRY_SHA256@"

[runtime.limits]
memory_mb = 256
open_files = 64
cpu_seconds = 60

[[permissions]]
id = "operations-read"
kind = "database"
description = "Read tenant-scoped Server Administrator operational state"
resources = ["postgres:table:host_metrics", "postgres:table:server_metric_history_5s", "postgres:table:server_metric_history_1m", "postgres:table:server_metric_history_5m", "postgres:table:server_metric_history_1h", "postgres:table:server_metric_history_6h", "postgres:table:host_stats_latest", "postgres:table:server_assets_latest", "postgres:table:server_target_health", "postgres:table:server_metric_alert_rules", "postgres:table:server_gadgetini_latest", "postgres:table:log_findings", "postgres:table:alert_state", "postgres:table:server_incidents", "postgres:table:server_incident_signals", "postgres:table:server_incident_events", "postgres:table:server_incident_knowledge_snapshots", "postgres:table:server_incident_enrichment_dispatches", "postgres:table:server_operation_outcomes", "postgres:table:server_job_runs", "postgres:table:server_profile_revisions", "postgres:table:server_cluster_revisions", "postgres:table:server_clusters", "postgres:table:server_enrollments", "postgres:table:server_validation_results"]

[[permissions]]
id = "operations-write"
kind = "database"
description = "Write tenant-scoped telemetry, findings, alerts, jobs and outcomes through Core-compiled mutations"
resources = ["postgres:table:host_metrics", "postgres:table:host_stats_latest", "postgres:table:server_assets_latest", "postgres:table:server_target_health", "postgres:table:server_metric_alert_rules", "postgres:table:server_gadgetini_latest", "postgres:table:server_gadgetini_observations", "postgres:table:log_findings", "postgres:table:alert_state", "postgres:table:server_incidents", "postgres:table:server_incident_signals", "postgres:table:server_incident_events", "postgres:table:server_incident_enrichment_dispatches", "postgres:table:server_operation_outcomes", "postgres:table:server_job_runs", "postgres:table:log_scan_cursor", "postgres:table:server_profile_revisions", "postgres:table:server_cluster_revisions", "postgres:table:server_clusters", "postgres:table:server_enrollments", "postgres:table:server_validation_results"]

[[permissions]]
id = "server-knowledge-read"
kind = "knowledge_read"
description = "Read actor-visible, revision-pinned Core knowledge context for a server target"
resources = ["knowledge:context"]

[[permissions]]
id = "server-knowledge-feedback"
kind = "knowledge_feedback"
description = "Return verified server repair outcomes to the Core experience lifecycle"
resources = ["knowledge:feedback"]

[[permissions]]
id = "ssh-operations"
kind = "network"
description = "Run signed inventory, telemetry, log and bounded monitoring-enrollment operations on Manager-approved SSH targets"
resources = ["ssh:operation:inventory", "ssh:operation:telemetry", "ssh:operation:topology", "ssh:operation:gadgetini-telemetry", "ssh:operation:log-scan", "ssh:operation:log-system-errors", "ssh:operation:log-kernel-warnings", "ssh:operation:log-auth-failures", "ssh:operation:monitoring-state", "ssh:operation:monitoring-enable", "ssh:operation:monitoring-disable"]

[[permissions.secret_references]]
id = "ssh-identity"
purpose = "Authenticate to a Manager-approved SSH target without exposing the private key to the Bundle"
required = true

[[permissions]]
id = "ssh-key-use"
kind = "secret_use"
description = "Use a Core-owned SSH identity only inside signed Server Administrator executors"
resources = ["secret:use:ssh-identity"]

[[broker_operations]]
id = "inventory"
kind = "ssh_execute"
network_permission_id = "ssh-operations"
network_resource = "ssh:operation:inventory"
secret_permission_id = "ssh-key-use"
secret_resource = "secret:use:ssh-identity"
command = '''
LC_ALL=C
export LC_ALL
set -eu
hostname_value=$(hostname 2>/dev/null || uname -n)
kernel_value=$(uname -sr 2>/dev/null || true)
architecture_value=$(uname -m 2>/dev/null || true)
machine_id_value=$(cat /etc/machine-id 2>/dev/null | head -n 1 || true)
boot_id_value=$(cat /proc/sys/kernel/random/boot_id 2>/dev/null | head -n 1 || true)
cpu_model_value=$(awk -F: '/model name/{sub(/^[[:space:]]*/, "", $2); print $2; exit}' /proc/cpuinfo 2>/dev/null || true)
logical_cpus_value=$(getconf _NPROCESSORS_ONLN 2>/dev/null || true)
memory_kib_value=$(awk '/^MemTotal:/{print $2; exit}' /proc/meminfo 2>/dev/null || true)
os_pretty_name_value=$(sed -n 's/^PRETTY_NAME=//p' /etc/os-release 2>/dev/null | head -n 1 | sed 's/^"//;s/"$//' || true)
uptime_value=$(awk '{printf "%.0f", $1}' /proc/uptime 2>/dev/null || printf '0')
dmi_uuid_value=$(cat /sys/class/dmi/id/product_uuid 2>/dev/null | tr -d '\r\n' | head -c 128 || true)
dmi_serial_value=$(
  if [ -r /sys/class/dmi/id/product_serial ]; then
    cat /sys/class/dmi/id/product_serial
  else
    cat /sys/class/dmi/id/chassis_serial 2>/dev/null
  fi | tr -d '\r\n' | head -c 128
)
nvidia_smi_path=$(command -v nvidia-smi 2>/dev/null || true)
if [ -z "$nvidia_smi_path" ] && [ -x /usr/lib/wsl/lib/nvidia-smi ]; then nvidia_smi_path=/usr/lib/wsl/lib/nvidia-smi; fi
printf 'hostname=%s\n' "$hostname_value"
printf 'kernel=%s\n' "$kernel_value"
printf 'architecture=%s\n' "$architecture_value"
printf 'machine_id=%s\n' "$machine_id_value"
printf 'boot_id=%s\n' "$boot_id_value"
printf 'cpu_model=%s\n' "$cpu_model_value"
printf 'logical_cpus=%s\n' "$logical_cpus_value"
printf 'memory_kib=%s\n' "$memory_kib_value"
printf 'os_pretty_name=%s\n' "$os_pretty_name_value"
printf 'uptime_seconds=%s\n' "$uptime_value"
printf 'dmi_uuid=%s\n' "$dmi_uuid_value"
printf 'dmi_serial=%s\n' "$dmi_serial_value"
if [ -n "$nvidia_smi_path" ]; then
  "$nvidia_smi_path" --query-gpu=index,uuid,name --format=csv,noheader,nounits 2>/dev/null |
    head -n 16 |
    while IFS= read -r gpu; do printf 'gpu=%s\n' "$gpu"; done
fi
'''
timeout_seconds = 15
max_stdout_bytes = 32768
max_stderr_bytes = 8192

[[broker_operations]]
id = "telemetry"
kind = "ssh_execute"
network_permission_id = "ssh-operations"
network_resource = "ssh:operation:telemetry"
secret_permission_id = "ssh-key-use"
secret_resource = "secret:use:ssh-identity"
command = '''
LC_ALL=C
export LC_ALL
set +e
nvidia_smi_path=$(command -v nvidia-smi 2>/dev/null || true)
if [ -z "$nvidia_smi_path" ] && [ -x /usr/lib/wsl/lib/nvidia-smi ]; then nvidia_smi_path=/usr/lib/wsl/lib/nvidia-smi; fi
printf '===HOST===\n'; hostname 2>/dev/null || uname -n
printf '===UPTIME===\n'; awk '{printf "%.0f\n", $1}' /proc/uptime 2>/dev/null
printf '===LOAD===\n'; head -n 1 /proc/loadavg 2>/dev/null
printf '===CPUINFO===\n'; getconf _NPROCESSORS_ONLN 2>/dev/null
printf '===STAT0===\n'; head -n 1 /proc/stat 2>/dev/null
printf '===NET0===\n'; cat /proc/net/dev 2>/dev/null
sleep 0.2
printf '===STAT1===\n'; head -n 1 /proc/stat 2>/dev/null
printf '===NET1===\n'; cat /proc/net/dev 2>/dev/null
printf '===MEM===\n'; head -n 256 /proc/meminfo 2>/dev/null
printf '===DF===\n'
df -PkT -x tmpfs -x devtmpfs -x squashfs -x overlay 2>/dev/null |
  awk 'NR > 1 && count < 32 {print $1 "|" $2 "|" $3 "|" $4 "|" $6 "|" $7; count++}'
printf '===SENSORS===\n'
if command -v sensors >/dev/null 2>&1; then
  sensors_output=$(timeout 3 sensors -j 2>/dev/null)
  if [ -n "$sensors_output" ]; then printf '%s\n' "$sensors_output"; else printf '{}\n'; fi
else
  printf '{}\n'
fi
printf '===NVSMI===\n'
if [ -n "$nvidia_smi_path" ]; then
  "$nvidia_smi_path" --query-gpu=index,name,utilization.gpu,memory.used,memory.total,temperature.gpu,power.draw,power.limit --format=csv,noheader,nounits 2>/dev/null | head -n 16
fi
printf '===NVSMI_HEALTH===\n'
if [ -n "$nvidia_smi_path" ]; then
  "$nvidia_smi_path" --query-gpu=index,uuid,ecc.errors.uncorrected.volatile.total,clocks_event_reasons.active --format=csv,noheader,nounits 2>/dev/null | head -n 16
fi
printf '===DCGM===\n'
if [ -x /usr/bin/dcgmi ]; then
  timeout 2 sudo -n /usr/bin/dcgmi dmon -c 1 -e 203,204,150,140,155,160,112,230,319,250,252 2>/dev/null | head -n 64
fi
printf '===IPMI===\n'
if [ -x /usr/bin/ipmitool ]; then
  timeout 5 sudo -n /usr/bin/ipmitool dcmi power reading 2>/dev/null | grep -i 'Instantaneous' | head -n 1
fi
printf '===XID===\n'
if [ -n "$nvidia_smi_path" ]; then
  sudo -n /usr/bin/dmesg 2>/dev/null | grep 'NVRM: Xid' | tail -n 16
fi
printf '===AVAILABILITY===\n'
command -v sensors >/dev/null 2>&1 && printf 'sensors=1\n' || printf 'sensors=0\n'
[ -n "$nvidia_smi_path" ] && printf 'nvidia_smi=1\n' || printf 'nvidia_smi=0\n'
[ -x /usr/bin/dcgmi ] && printf 'dcgm=1\n' || printf 'dcgm=0\n'
[ -x /usr/bin/ipmitool ] && printf 'ipmitool=1\n' || printf 'ipmitool=0\n'
printf '===END===\n'
'''
timeout_seconds = 30
max_stdout_bytes = 131072
max_stderr_bytes = 8192

[[broker_operations]]
id = "topology"
kind = "ssh_execute"
network_permission_id = "ssh-operations"
network_resource = "ssh:operation:topology"
secret_permission_id = "ssh-key-use"
secret_resource = "secret:use:ssh-identity"
command = '''
LC_ALL=C
export LC_ALL
set +e
printf '===LINK===\n'
link_output=$(ip -j -d link show 2>/dev/null)
if [ -n "$link_output" ]; then printf '%s\n' "$link_output"; else printf '[]\n'; fi
printf '===ADDR===\n'
addr_output=$(ip -j addr show 2>/dev/null)
if [ -n "$addr_output" ]; then printf '%s\n' "$addr_output"; else printf '[]\n'; fi
printf '===NEIGH===\n'
neigh_output=$(ip -j neigh show 2>/dev/null)
if [ -n "$neigh_output" ]; then printf '%s\n' "$neigh_output"; else printf '[]\n'; fi
printf '===ROUTE===\n'
route_output=$(ip -j route show table main 2>/dev/null)
if [ -n "$route_output" ]; then printf '%s\n' "$route_output"; else printf '[]\n'; fi
printf '===ETHTOOL===\n'
for interface_path in /sys/class/net/*; do
  interface=${interface_path##*/}
  case "$interface" in lo|veth*|br-*|docker0|docker_gwbridge|virbr*|lxdbr*|incusbr*|cni*|flannel*|cilium*) continue;; esac
  speed=$(ethtool "$interface" 2>/dev/null | awk -F': ' '/Speed:/{print $2; exit}')
  printf '%s %s\n' "$interface" "${speed:-unknown}"
done
printf '===LLDP===\n'
if command -v lldpctl >/dev/null 2>&1; then
  lldp_output=$(timeout 3 lldpctl -f json0 2>/dev/null)
  if [ -n "$lldp_output" ]; then printf '%s\n' "$lldp_output"; else printf '{}\n'; fi
else
  printf '{}\n'
fi
printf '===AVAILABILITY===\n'
command -v ethtool >/dev/null 2>&1 && printf 'ethtool=1\n' || printf 'ethtool=0\n'
command -v lldpctl >/dev/null 2>&1 && printf 'lldp=1\n' || printf 'lldp=0\n'
printf '===END===\n'
'''
timeout_seconds = 30
max_stdout_bytes = 131072
max_stderr_bytes = 8192


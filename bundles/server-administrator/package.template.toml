[[broker_operations]]
id = "log-auth-failures"
kind = "ssh_execute"
network_permission_id = "ssh-operations"
network_resource = "ssh:operation:log-auth-failures"
secret_permission_id = "ssh-key-use"
secret_resource = "secret:use:ssh-identity"
command = '''
LC_ALL=C
export LC_ALL
set -eu
if command -v journalctl >/dev/null 2>&1; then
  journalctl --no-pager -b -n 500 -p notice..alert -o short-iso 2>/dev/null |
    grep -E ' (sshd|sudo)(\[|:)|authentication failure|Failed password' |
    tail -n 200 || true
elif [ -r /var/log/auth.log ]; then
  tail -n 500 /var/log/auth.log |
    grep -E ' (sshd|sudo)(\[|:)|authentication failure|Failed password' |
    tail -n 200 || true
elif [ -r /var/log/secure ]; then
  tail -n 500 /var/log/secure |
    grep -E ' (sshd|sudo)(\[|:)|authentication failure|Failed password' |
    tail -n 200 || true
fi
'''
timeout_seconds = 20
max_stdout_bytes = 131072
max_stderr_bytes = 8192

[[broker_operations]]
id = "gadgetini-telemetry"
kind = "ssh_execute"
network_permission_id = "ssh-operations"
network_resource = "ssh:operation:gadgetini-telemetry"
secret_permission_id = "ssh-key-use"
secret_resource = "secret:use:ssh-identity"
command = '''
LC_ALL=C
export LC_ALL
set -eu
command -v redis-cli >/dev/null 2>&1 || exit 69
redis-cli --raw MGET air_humit air_temp chassis_stabil coolant_delta_t1 coolant_leak coolant_level coolant_temp_inlet1 coolant_temp_inlet2 coolant_temp_outlet1 coolant_temp_outlet2 host_stat
'''
timeout_seconds = 10
max_stdout_bytes = 4096
max_stderr_bytes = 2048

[[broker_operations]]
id = "monitoring-state"
kind = "ssh_execute"
network_permission_id = "ssh-operations"
network_resource = "ssh:operation:monitoring-state"
secret_permission_id = "ssh-key-use"
secret_resource = "secret:use:ssh-identity"
command = '''
set -eu
state=disabled
if [ "$(cat "$HOME/.local/state/gadgetron-monitor/enabled" 2>/dev/null || true)" = enabled ]; then
  state=enabled
fi
printf 'monitoring=%s\n' "$state"
'''
timeout_seconds = 5
max_stdout_bytes = 128
max_stderr_bytes = 1024

[[broker_operations]]
id = "monitoring-enable"
kind = "ssh_execute"
network_permission_id = "ssh-operations"
network_resource = "ssh:operation:monitoring-enable"
secret_permission_id = "ssh-key-use"
secret_resource = "secret:use:ssh-identity"
command = '''
set -eu
umask 077
mkdir -p "$HOME/.local/state/gadgetron-monitor"
tmp=$(mktemp "$HOME/.local/state/gadgetron-monitor/enabled.XXXXXX")
printf 'enabled\n' > "$tmp"
chmod 0600 "$tmp"
mv "$tmp" "$HOME/.local/state/gadgetron-monitor/enabled"
printf 'monitoring=enabled\n'
'''
timeout_seconds = 5
max_stdout_bytes = 128
max_stderr_bytes = 1024

[[broker_operations]]
id = "monitoring-disable"
kind = "ssh_execute"
network_permission_id = "ssh-operations"
network_resource = "ssh:operation:monitoring-disable"
secret_permission_id = "ssh-key-use"
secret_resource = "secret:use:ssh-identity"
command = '''
set -eu
rm -f "$HOME/.local/state/gadgetron-monitor/enabled"
printf 'monitoring=disabled\n'
'''
timeout_seconds = 5
max_stdout_bytes = 128
max_stderr_bytes = 1024


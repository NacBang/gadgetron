manifest_version = 3

[bundle]
id = "travel-planner"
version = "0.2.0"
class = "operational"
publisher = "gadgetron.project"
license = "Apache-2.0"

[compatibility]
gadgetron = ">=0.7.16, <2.0.0"
host_protocol_min = 1
host_protocol_max = 1

[[dependencies.optional]]
capability = "gadgetron.intelligence.restaurant-context"
version = "^1.0"
feature = "restaurant-assisted-planning"
reason = "Fresh cited restaurant context improves itinerary choices without owning Travel state"

[[dependencies.optional]]
capability = "gadgetron.intelligence.travel-context"
version = "^1.0"
feature = "destination-research"
reason = "Cited destination and advisory research improves Trip decisions without owning Travel state"

[runtime]
kind = "subprocess"
transport = "json_rpc_stdio"
entry = "bin/travel-planner"
entry_sha256 = "@ENTRY_SHA256@"

[runtime.limits]
memory_mb = 192
open_files = 48
cpu_seconds = 30

[[permissions]]
id = "travel-read"
kind = "database"
description = "Read tenant-scoped Travel Planner records"
resources = ["postgres:table:travel_trips", "postgres:table:travel_itinerary_items", "postgres:table:travel_constraints", "postgres:table:travel_budget_items", "postgres:table:travel_disruptions", "postgres:table:travel_replans", "postgres:table:travel_operation_outcomes"]

[[permissions]]
id = "travel-write"
kind = "database"
description = "Write tenant-scoped Travel Planner records through Core-compiled mutations"
resources = ["postgres:table:travel_trips", "postgres:table:travel_itinerary_items", "postgres:table:travel_constraints", "postgres:table:travel_budget_items", "postgres:table:travel_disruptions", "postgres:table:travel_replans", "postgres:table:travel_operation_outcomes"]

[[permissions]]
id = "travel-knowledge-read"
kind = "knowledge_read"
description = "Read actor-visible, revision-pinned Core knowledge context"
resources = ["knowledge:context"]

[[permissions]]
id = "travel-knowledge-feedback"
kind = "knowledge_feedback"
description = "Return verified Travel outcomes to the Core experience lifecycle"
resources = ["knowledge:feedback"]

[capabilities]
gadget_namespaces = ["travel"]

[[capabilities.provides]]
id = "gadgetron.operation.travel-planning"
version = "1.0.0"
description = "Revisioned trip, itinerary, disruption re-plan and outcome capabilities"

[[capabilities.gadgets]]
name = "travel.trip-list"
description = "List tenant-scoped Trips in deterministic date order"
tier = "read"
input_schema = { type = "object", properties = { limit = { type = "integer", minimum = 1, maximum = 500 } }, additionalProperties = false }
output_schema = { type = "object", properties = { rows = { type = "array" }, count = { type = "integer" }, truncated = { type = "boolean" } }, required = ["rows", "count", "truncated"] }

[capabilities.gadgets.effect]
risk = "low"
idempotent = true
reversible = true
requires_evidence = false

[[capabilities.gadgets]]
name = "travel.trip-get"
description = "Read one Trip by stable id"
tier = "read"
input_schema = { type = "object", properties = { trip_id = { type = "string", format = "uuid" } }, required = ["trip_id"], additionalProperties = false }
output_schema = { type = "object" }

[capabilities.gadgets.effect]
risk = "low"
idempotent = true
reversible = true
requires_evidence = false

[[capabilities.gadgets]]
name = "travel.trip-upsert"
description = "Create a Trip or replace its current revision"
tier = "write"
input_schema = { type = "object", properties = { trip_id = { type = "string", format = "uuid" }, revision = { type = "integer", minimum = 1 }, title = { type = "string", minLength = 1, maxLength = 200 }, origin = { type = "string", minLength = 1, maxLength = 200 }, start_date = { type = "string", format = "date" }, end_date = { type = "string", format = "date" }, timezone = { type = "string", minLength = 1, maxLength = 64 }, traveler_count = { type = "integer", minimum = 1, maximum = 100 }, status = { type = "string", enum = ["draft", "planned", "active", "completed", "cancelled"] }, currency = { type = "string", pattern = "^[A-Z]{3}$" }, budget_amount_minor = { type = "integer", minimum = 0 }, notes = { type = "string", maxLength = 4096 } }, required = ["title", "origin", "start_date", "end_date", "timezone", "traveler_count", "status", "currency", "budget_amount_minor"], additionalProperties = false }
output_schema = { type = "object" }

[capabilities.gadgets.effect]
risk = "low"
idempotent = false
reversible = false
requires_evidence = true

[[capabilities.gadgets]]
name = "travel.trip-delete"
description = "Delete one exact Trip revision and its Travel-owned children"
tier = "write"
input_schema = { type = "object", properties = { id = { type = "string", format = "uuid", title = "Trip ID" }, revision = { type = "integer", minimum = 1, title = "Current revision" } }, required = ["id", "revision"], additionalProperties = false }
output_schema = { type = "object", properties = { id = { type = "string" }, deleted = { type = "boolean" } }, required = ["id", "deleted"] }

[capabilities.gadgets.effect]

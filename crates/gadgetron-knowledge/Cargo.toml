[package]
name = "gadgetron-knowledge"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Knowledge layer for Kairos — wiki store, web search proxy, MCP server"

[dependencies]
gadgetron-core = { workspace = true }

thiserror = { workspace = true }
tracing = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
toml = { workspace = true }

# Wiki subsystem — git backend + credential patterns
git2 = { workspace = true }
regex = { workspace = true }
once_cell = { workspace = true }
libc = { workspace = true }

# Web search subsystem (SearXNG client)
async-trait = { workspace = true }
reqwest = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
proptest = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

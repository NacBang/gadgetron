[advisories]
version = 2
ignore = [
    "RUSTSEC-2023-0071",  # rsa via sqlx-mysql (postgres-only usage)
    "RUSTSEC-2024-0436",  # paste unmaintained (transitive dep, no alternative)
    "RUSTSEC-2026-0097",  # rand unsound with custom logger (we don't use custom loggers)
    "RUSTSEC-2026-0104",  # rustls-webpki CRL parsing panic — we don't parse CRLs; rustls default verifier doesn't use this path
]

[licenses]
version = 2
allow = [
    "MIT",
    "MIT-0",                              # MIT No Attribution — OSI approved; transitive via jsonschema (borrow-or-share)
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"

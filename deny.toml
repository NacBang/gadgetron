[advisories]
vulnerability = "deny"
unmaintained = "warn"
ignore = [
    # RUSTSEC-2023-0071: rsa crate Marvin Attack — transitive dep via sqlx-mysql.
    # We only use sqlx with postgres feature; mysql code path is never executed.
    # No fix available upstream. Tracked: https://rustsec.org/advisories/RUSTSEC-2023-0071
    "RUSTSEC-2023-0071",
]

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
